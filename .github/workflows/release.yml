name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Signed Windows release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build and publish signed release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: "Atena v__VERSION__"
          releaseBody: |
            ## O que mudou desde a v0.1.4

            - O orquestrador agora persiste planos, etapas, eventos e templates personalizados no SQLite local.
            - Planos e squads voltam após reiniciar o Atena, sem banco externo, conta ou API de dados.
            - Templates antigos do localStorage são migrados uma única vez com validação e sem duplicação.
            - O ciclo de vida dos terminais PTY e o armazenamento de processos foram encapsulados para reduzir estados inconsistentes.

            ## Melhorias

            - Operações locais tipadas entre React, Tauri e Rust, com transações para gravações de múltiplas etapas.
            - Mensagens de erro de persistência mais claras, sem exibir `[object Object]`.
            - Correção da gravação de etapas novas sem resumo, evitando falhas de restrição no SQLite.
            - Novos testes de migração, gateway, repositório e integração do hook de persistência.

            Consulte abaixo o changelog completo e os instaladores desta versão.
          generateReleaseNotes: true
          releaseDraft: false
          prerelease: false
